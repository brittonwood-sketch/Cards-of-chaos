<style>

  h2{font-size:26px; font-weight:900; margin:6px 0 14px; text-shadow:2px 2px 0 var(--ink);}

  .field{
    width:100%; font-size:18px; font-weight:800; color:var(--ink);
    background:var(--paper); border:3px solid var(--ink); border-radius:12px;
    padding:13px 14px; box-shadow:var(--shadow-sm); outline:none;
    font-family:inherit;
  }
  .field:focus{border-color:var(--violet);}
  .field.code{letter-spacing:8px; text-transform:uppercase; text-align:center; font-size:26px; font-weight:900;}

<script>
/* ---- library loader: PeerJS (required) + QRCode (optional) ---- */
function loadScript(srcs, onDone){
  var i = 0;
  function tryNext(){
    if (i >= srcs.length){ onDone(false); return; }
    var s = document.createElement("script");
    s.src = srcs[i++];
    s.onload = function(){ onDone(true); };
    s.onerror = function(){ s.remove(); tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
}
window.__peerReady = new Promise(function(resolve){
  loadScript([
    "https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js",
    "https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js",
    "https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"
  ], resolve);
});
window.__qrReady = new Promise(function(resolve){
  loadScript([
    "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js",
    "https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"
  ], resolve);
});
</script>

/* ============================ NETWORK ============================ */
let peer = null;         // my Peer instance
let hostConns = new Map();   // host: pid -> conn
let lastSeen = new Map();    // host: pid -> ts
let joinConn = null;         // joiner: conn to host
let sweepTimer = null, pingTimer = null, redialTimer = null, autoNextTimer = null;
let redialTries = 0;

function killNet(){
  [sweepTimer, pingTimer, redialTimer, autoNextTimer].forEach(t => { if (t) clearInterval(t), clearTimeout(t); });
  sweepTimer = pingTimer = redialTimer = autoNextTimer = null;
  if (joinConn){ try { joinConn.close(); } catch(e){} joinConn = null; }
  hostConns.forEach(c => { try { c.close(); } catch(e){} });
  hostConns.clear(); lastSeen.clear();
  if (peer){ try { peer.destroy(); } catch(e){} peer = null; }
  redialTries = 0;
}

function newPeer(id){
  const opts = { debug: 1 };
  return id ? new Peer(id, opts) : new Peer(opts);
}

/* ---------------- HOST SIDE ---------------- */
let S = null;   // authoritative state (host only)
let deck = [], discard = [], promptDeck = [];

function persistHost(){
  if (!S) return;
  saveLS("coc:host", { code: S.code, S: S, deck: deck, discard: discard, promptDeck: promptDeck });
  saveLS("coc:session", { role: "host", code: S.code, name: C.name, emoji: C.emoji });
}

function startHost(resume){
  killNet();
  C.err = ""; C.conn = "connecting"; C.isHost = true;
  render();

    if (!ok || typeof Peer === "undefined"){ C.err = "Couldn't load the connection library. Check your internet and reload."; C.conn="lost"; C.mode="home"; render(); return; }

    const attempt = () => {
      const code = resume ? resume.code : makeCode();
      peer = newPeer(PREFIX + code);
      peer.on("open", () => {
        if (resume){
          S = resume.S; deck = resume.deck || []; discard = resume.discard || []; promptDeck = resume.promptDeck || [];

          buildDecks();
        }
        C.mode = "room"; C.conn = "ok"; C.sel = []; C.picked = false;
        grabWakeLock();
        sweepTimer = setInterval(hostSweep, PING_MS);
        broadcast();   /* builds C.pub and renders the lobby (also persists) */
      });
      peer.on("connection", wireGuest);
      peer.on("error", (e) => {
        if (e && e.type === "unavailable-id" && !resume && tries < 6){ tries++; try{peer.destroy();}catch(_){} attempt(); return; }
        if (e && e.type === "unavailable-id" && resume){
          C.err = "That game is still running somewhere else. Close the old tab first, or start a fresh game.";
        } else {
          C.err = "Connection trouble: " + (e && e.type ? e.type : "unknown") + ". Reload and try again.";
        }
        C.conn = "lost"; C.mode = "home"; render();
      });
      peer.on("disconnected", () => { try { peer.reconnect(); } catch(_){} });
    };
    attempt();
  });
}

function wireGuest(conn){
  conn.on("data", (m) => handleGuestMsg(conn, m));
  conn.on("close", () => {
    for (const [pid, c] of hostConns){ if (c === conn){ hostConns.delete(pid); markGone(pid); } }
  });
  conn.on("error", () => {});
}

function handleGuestMsg(conn, m){
  if (!m || !S) return;
  if (m.t === "hello"){
    let p = S.players.find(x => x.pid === m.pid);
    if (!p){
      if (S.players.length >= MAX_PLAYERS){ try { conn.send({t:"deny", reason:"That game is full (10 players max)."}); } catch(e){} return; }
      let nm = String(m.name || "Player").slice(0, 16).trim() || "Player";
      const dupes = S.players.filter(x => x.name === nm || x.name.replace(/ \d+$/,"") === nm).length;
      if (dupes) nm = nm + " " + (dupes + 1);
      p = { pid: m.pid, name: nm, emoji: m.emoji || EMOJIS[S.players.length % EMOJIS.length], score: 0, connected: true, hand: [] };
      S.players.push(p);
      if (S.phase !== "lobby" && S.phase !== "over") refill(p);
    } else {
      p.connected = true;
      if (m.name) { /* keep original name to avoid mid-game renames */ }
    }
    const old = hostConns.get(m.pid);
    if (old && old !== conn){ try { old.close(); } catch(e){} }
    hostConns.set(m.pid, conn);
    lastSeen.set(m.pid, Date.now());
    broadcast();
    return;
  }
  if (m.t === "ping"){ lastSeen.set(m.pid, Date.now()); const p = S.players.find(x=>x.pid===m.pid); if (p && !p.connected){ p.connected = true; broadcast(); } return; }
  if (m.t === "leave"){ const p = S.players.find(x=>x.pid===m.pid); if (p){ p.connected = false; if (S.phase==="lobby"){ S.players = S.players.filter(x=>x.pid!==m.pid); hostConns.delete(m.pid);} czarGuard(m.pid); broadcast(); } return; }
  if (m.t === "submit"){ lastSeen.set(m.pid, Date.now()); onSubmit(m.pid, m.round, m.cards); return; }
  if (m.t === "czarPick"){ lastSeen.set(m.pid, Date.now()); onPick(m.pid, m.round, m.sid); return; }
}

function markGone(pid){
  if (!S) return;
  const p = S.players.find(x => x.pid === pid);
  if (p && p.connected){ p.connected = false; czarGuard(pid); broadcast(); }
}

function hostSweep(){
  if (!S) return;
  const now = Date.now();
  let changed = false;
  S.players.forEach(p => {
    if (p.pid === MYPID) return;
    const seen = lastSeen.get(p.pid) || 0;
    if (p.connected && now - seen > STALE_MS){ p.connected = false; czarGuard(p.pid); changed = true; }
  });
  if (changed) broadcast();
}

function czarGuard(gonePid){
  if (!S || S.phase === "lobby" || S.phase === "over") return;
  if (S.czarPid !== gonePid) {
    /* if everyone left has submitted once czar-less check */
    if (S.phase === "submitting") maybeJudge();
    return;
  }
  const alive = S.players.filter(p => p.connected);
  if (!alive.length) return;
  const next = nextCzarFrom(S.czarPid);
  S.czarPid = next ? next.pid : alive[0].pid;
  delete S.submissions[S.czarPid];
  if (S.phase === "submitting") maybeJudge();
}

function pubFor(pid){
  const me = S.players.find(p => p.pid === pid);
  return {
    code: S.code, phase: S.phase, round: S.round, settings: S.settings,
    hostPid: S.hostPid, czarPid: S.czarPid, black: S.black,
    players: S.players.map(p => ({ pid: p.pid, name: p.name, emoji: p.emoji, score: p.score, connected: p.connected, submitted: !!S.submissions[p.pid] })),
    revealed: S.revealed, lastWinner: S.lastWinner, winnerPid: S.winnerPid, finalRanking: S.finalRanking,
    youPid: pid, hand: me ? me.hand.slice() : []
  };
}

function broadcast(){
  if (!S) return;
  for (const [pid, conn] of hostConns){
    if (conn && conn.open){ try { conn.send({ t: "state", pub: pubFor(pid) }); } catch(e){} }
  }
  C.pub = pubFor(MYPID);
  persistHost();
  render();
}

/* ---------------- GAME LOGIC (host) ---------------- */
function freshState(code){
  return {
    code: code, hostPid: MYPID, phase: "lobby", round: 0,
    settings: { target: C.target, allowPick2: C.allowPick2 },
    players: [{ pid: MYPID, name: (C.name || "Host").slice(0,16), emoji: C.emoji, score: 0, connected: true, hand: [] }],
    czarPid: null, black: null,
    submissions: {}, revealed: [], revealMap: {},
    lastWinner: null, winnerPid: null, finalRanking: null
  };
}

function buildDecks(){
  deck = shuffle(ANSWERS);
  discard = [];
  promptDeck = shuffle(PROMPTS.filter(p => S.settings.allowPick2 ? true : (p.pick || 1) === 1));
}

function draw(){
  if (!deck.length){
    const inHands = new Set(); S.players.forEach(p => p.hand.forEach(c => inHands.add(c)));
    deck = shuffle(discard.length ? discard : ANSWERS.filter(c => !inHands.has(c)));
    discard = [];
    if (!deck.length) deck = shuffle(ANSWERS);
  }
  return deck.pop();
}

function refill(p){ while (p.hand.length < HAND) p.hand.push(draw()); }

function nextPrompt(){
  if (!promptDeck.length) promptDeck = shuffle(PROMPTS.filter(p => S.settings.allowPick2 ? true : (p.pick || 1) === 1));
  return promptDeck.pop();
}

function nextCzarFrom(pid){
  const idx = S.players.findIndex(p => p.pid === pid);
  const n = S.players.length;
  for (let step = 1; step <= n; step++){
    const cand = S.players[(idx + step) % n];
    if (cand.connected) return cand;
  }
  return null;
}

function startGame(){
  if (!S) return;
  const conn = S.players.filter(p => p.connected);
  if (conn.length < MIN_PLAYERS) return;
  S.settings.target = C.target;
  S.settings.allowPick2 = C.allowPick2;
  buildDecks();
  S.players.forEach(p => { p.score = 0; p.hand = []; if (p.connected) refill(p); });
  S.round = 1;
  S.czarPid = conn[0].pid;
  S.black = nextPrompt();
  S.submissions = {}; S.revealed = []; S.revealMap = {};
  S.lastWinner = null; S.winnerPid = null; S.finalRanking = null;
  S.phase = "submitting";
  C.sel = []; C.picked = false;
  broadcast();
}

function onSubmit(pid, round, cards){
  if (!S || S.phase !== "submitting" || round !== S.round) return;
  if (pid === S.czarPid || S.submissions[pid]) return;
  const p = S.players.find(x => x.pid === pid);
  if (!p || !Array.isArray(cards)) return;
  const need = (S.black && S.black.pick) || 1;
  if (cards.length !== need) return;
  for (const c of cards){ if (!p.hand.includes(c)) return; }
  S.submissions[pid] = cards.slice();
  cards.forEach(c => { p.hand.splice(p.hand.indexOf(c), 1); });
  maybeJudge();
  broadcast();
}

function maybeJudge(){
  if (!S || S.phase !== "submitting") return;
  const needers = S.players.filter(p => p.connected && p.pid !== S.czarPid);
  if (needers.length >= 1 && needers.every(p => S.submissions[p.pid])) startJudging();
}

function startJudging(){
  const entries = Object.entries(S.submissions);   // includes any who submitted then dropped
  if (!entries.length){ skipRound(); return; }
  const order = shuffle(entries);
  S.revealed = order.map(([pid, cards], i) => ({ sid: i, cards: cards }));
  S.revealMap = {}; order.forEach(([pid], i) => { S.revealMap[i] = pid; });
  S.phase = "judging";
}

function onPick(pid, round, sid){
  if (!S || S.phase !== "judging" || round !== S.round) return;
  if (pid !== S.czarPid) return;
  const winPid = S.revealMap[sid];
  if (winPid == null) return;
  const w = S.players.find(x => x.pid === winPid);
  Object.values(S.submissions).forEach(cards => discard.push(...cards));
  if (w){
    w.score += 1;
    S.lastWinner = { name: w.name, emoji: w.emoji, cards: S.submissions[winPid].slice(), promptText: S.black.text };
    S.winnerPid = winPid;
    if (w.score >= S.settings.target){ finishGame(); broadcast(); return; }
  }
  S.phase = "result";
  broadcast();
  if (autoNextTimer) clearTimeout(autoNextTimer);
  autoNextTimer = setTimeout(() => { if (S && S.phase === "result") nextRound(); }, RESULT_AUTO_MS);
}

function nextRound(){
  if (!S) return;
  if (autoNextTimer){ clearTimeout(autoNextTimer); autoNextTimer = null; }
  S.round += 1;
  S.players.forEach(p => { if (p.connected) refill(p); });
  const nc = nextCzarFrom(S.czarPid);
  S.czarPid = nc ? nc.pid : (S.players.find(p=>p.connected) || S.players[0]).pid;
  S.black = nextPrompt();
  S.submissions = {}; S.revealed = []; S.revealMap = {};
  S.winnerPid = null;
  S.phase = "submitting";
  C.sel = []; C.picked = false;
  broadcast();
}

function skipRound(){
  if (!S || (S.phase !== "submitting" && S.phase !== "judging")) return;
  Object.values(S.submissions).forEach(cards => discard.push(...cards));
  S.lastWinner = null;
  nextRound();
}

function finishGame(){
  S.finalRanking = S.players.slice().sort((a,b) => b.score - a.score)
    .map(p => ({ name: p.name, emoji: p.emoji, score: p.score, pid: p.pid }));
  S.phase = "over";
}

function endGameNow(){ if (!S) return; finishGame(); broadcast(); }

function playAgain(){
  if (!S) return;
  S.phase = "lobby"; S.round = 0;
  S.players.forEach(p => { p.score = 0; p.hand = []; });
  S.black = null; S.czarPid = null;
  S.submissions = {}; S.revealed = []; S.revealMap = {};
  S.lastWinner = null; S.winnerPid = null; S.finalRanking = null;
  C.sel = []; C.picked = false;
  broadcast();
}

/* ---------------- JOINER SIDE ---------------- */
function startJoin(code){
  killNet();
  C.err = ""; C.conn = "connecting"; C.isHost = false;
  render();
  window.__peerReady.then((ok) => {
    if (!ok || typeof Peer === "undefined"){ C.err = "Couldn't load the connection library. Check your internet and reload."; C.conn="lost"; C.mode="join"; render(); return; }
    peer = newPeer();
    peer.on("open", () => dialHost(code));
    peer.on("error", (e) => {
      if (e && e.type === "peer-unavailable"){
        if (C.mode === "room" && C.pub){ scheduleRedial(code); return; }
        C.err = "Couldn't find that game. Double-check the code with the host — and make sure their screen is on.";
        C.conn = "lost"; C.mode = "join"; render();
      } else if (e && (e.type === "network" || e.type === "disconnected")){
        try { peer.reconnect(); } catch(_){}
      }
    });
    peer.on("disconnected", () => { try { peer.reconnect(); } catch(_){} });
  });
}

function dialHost(code){
  const conn = peer.connect(PREFIX + code, { reliable: true });
  let opened = false;
  conn.on("open", () => {
    opened = true; redialTries = 0;
    joinConn = conn;
    C.conn = "ok";
    conn.send({ t: "hello", pid: MYPID, name: C.name, emoji: C.emoji });
    saveLS("coc:session", { role: "guest", code: code, name: C.name, emoji: C.emoji });
    if (pingTimer) clearInterval(pingTimer);
    pingTimer = setInterval(() => { if (joinConn && joinConn.open) { try { joinConn.send({ t: "ping", pid: MYPID }); } catch(e){} } }, PING_MS);
    grabWakeLock();
    render();
  });
  conn.on("data", (m) => {
    if (!m) return;
    if (m.t === "state"){
      const prev = C.pub;
      C.pub = m.pub; C.mode = "room"; C.conn = "ok";
      if (!prev || prev.round !== m.pub.round || prev.phase !== m.pub.phase){
        if (m.pub.phase === "submitting"){ C.sel = []; C.picked = false; }
        if (m.pub.phase === "judging" && (!prev || prev.phase !== "judging")){ C.picked = false; }
      }
      render();
    }
    if (m.t === "deny"){ C.err = m.reason || "Couldn't join that game."; C.conn = "lost"; C.mode = "join"; killNet(); render(); }
  });
  conn.on("close", () => { if (opened) scheduleRedial(code); });
  conn.on("error", () => {});
  setTimeout(() => { if (!opened && C.conn === "connecting" && C.mode !== "room"){ /* peer-unavailable usually fires; this is a safety net */ } }, 9000);
}

function scheduleRedial(code){
  if (C.mode !== "room" && C.mode !== "join") return;
  C.conn = "reconnecting"; render();
  if (redialTimer) clearTimeout(redialTimer);
  redialTries += 1;
  if (redialTries > 14){
    C.conn = "lost";
    C.err = "Lost the game. Ask the host if their screen is still on, then tap Rejoin.";
    C.mode = "join"; render(); return;
  }
  redialTimer = setTimeout(() => { if (peer && !peer.destroyed) dialHost(code); }, Math.min(1500 * redialTries, 6000));
}

function leaveGame(){
  if (!C.isHost && joinConn && joinConn.open){ try { joinConn.send({ t: "leave", pid: MYPID }); } catch(e){} }
  if (C.isHost){ dropLS("coc:host"); }
  dropLS("coc:session");
  killNet();
  S = null; C.pub = null; C.mode = "home"; C.err = ""; C.conn = "ok"; C.sel = []; C.picked = false; C.isHost = false;
  render();
}

  else if (C.mode === "join") html = vJoin();
  else if (C.mode === "room") html = vRoom();

  if (C.mode === "room" && C.pub && C.pub.phase === "lobby" && C.isHost) drawQR();
}

function vRoom(){

function chipRow(p){
  return '<div class="chips">' + p.players.map(pl => {
    const you = pl.pid === p.youPid ? ' you' : '';
    const gone = pl.connected ? '' : ' gone';
    const crown = pl.pid === p.czarPid && p.phase !== "lobby" ? '<span class="crown">👑</span>' : '';

function blackCard(p){

function vSubmitting(p){
  const isCzar = p.youPid === p.czarPid;
  const me = p.players.find(x => x.pid === p.youPid);
  const submitted = me && me.submitted;
  const need = (p.black.pick || 1);
  const waitingOn = p.players.filter(x => x.connected && x.pid !== p.czarPid && !x.submitted).length;
  let mid;
  if (isCzar){
    mid = '<div class="waitrow"><div class="spin"></div> You\u2019re the Judge 👑 \u2014 waiting for ' + waitingOn + ' card' + (waitingOn===1?'':'s') + '\u2026</div>';
  } else if (submitted){
    mid = '<div class="waitrow"><div class="spin"></div> Card' + (need>1?'s':'') + ' in! Waiting on ' + waitingOn + ' more\u2026</div>';
  } else {
    const selBtns = C.sel.length === need
      ? '<button class="btn pink" data-a="submitCards">Play ' + (need > 1 ? 'these cards' : 'this card') + '</button>'
      : '<button class="btn pink" disabled>Pick ' + (need - C.sel.length) + ' more</button>';
    mid = '<div class="hand">' + p.hand.map((c, i) => {
      const si = C.sel.indexOf(i);
      return '<div class="card' + (si >= 0 ? ' sel' : '') + '" data-a="selCard" data-v="' + i + '">' + esc(c) +
        (si >= 0 && need > 1 ? '<span class="ord">' + (si + 1) + '</span>' : '') + '</div>';
    }).join('') + '</div>' + selBtns;
  }
  return scorebar(p) + blackCard(p) + mid + chipRow(p) + hostTools(p);
}

function vJudging(p){
  const isCzar = p.youPid === p.czarPid;
  const czar = p.players.find(x => x.pid === p.czarPid);
  const head = isCzar
    ? '<p class="statusline">You\u2019re the Judge 👑 \u2014 tap the funniest!</p>'
    : '<p class="statusline">' + esc(czar ? czar.name : "The Judge") + ' 👑 is judging\u2026</p>';
  const cards = '<div class="hand">' + p.revealed.map(r => {
    const inner = r.cards.map((c, i) => i === 0 ? esc(c) : '<div class="multi">' + esc(c) + '</div>').join('');
    return '<div class="card' + (isCzar && !C.picked ? ' judge' : '') + '"' + (isCzar && !C.picked ? ' data-a="pickCard" data-v="' + r.sid + '"' : '') + '>' + inner + '</div>';
  }).join('') + '</div>';
  return scorebar(p) + blackCard(p) + head + cards + chipRow(p) + hostTools(p);
}

function vResult(p){
  const w = p.lastWinner;
  const isHost = p.youPid === p.hostPid;
  const won = w ? '<div class="winnerBox"><div class="who">' + w.emoji + ' ' + esc(w.name) + ' wins the round!</div>' +
    '<div class="played">' + esc(w.promptText).replace(/___/g, '\u2026') + '<br/><b>' + w.cards.map(esc).join(' + ') + '</b></div></div>'
    : '<div class="notice">No cards came in \u2014 skipping ahead.</div>';
  return scorebar(p) + won + chipRow(p) +
    (isHost ? '<button class="btn lime" data-a="nextRound" style="margin-top:18px">Next round</button>' : '<div class="waitrow"><div class="spin"></div> Next round starting\u2026</div>') +
    hostTools(p);
}

function vOver(p){
  const isHost = p.youPid === p.hostPid;
  const list = (p.finalRanking || []).map((r, i) =>
    '<li><span>' + (i === 0 ? '🏆 ' : (i + 1) + '. ') + r.emoji + ' ' + esc(r.name) + '</span><span>' + r.score + ' pts</span></li>'
  ).join('');
  const champ = p.finalRanking && p.finalRanking[0];
  return logo() +
    (champ ? '<div class="winnerBox"><div class="who">' + champ.emoji + ' ' + esc(champ.name) + ' takes the crown! 👑</div></div>' : '') +
    '<ol class="podium">' + list + '</ol>' +
    (isHost ? '<button class="btn pink" data-a="playAgain">Play again</button>' : '<p class="statusline">Ask the host to run it back!</p>') +
    '<button class="linkbtn" data-a="leave">Leave game</button>';
}

function drawQR(){
  window.__qrReady.then((ok) => {
    const el = document.getElementById("qr");
    if (!ok || !el || typeof QRCode === "undefined") return;
    if (!location.protocol.startsWith("http")) return;
    el.innerHTML = "";
    const url = location.origin + location.pathname + "?code=" + C.pub.code;
    new QRCode(el, { text: url, width: 128, height: 128, correctLevel: QRCode.CorrectLevel.M });
  });
}

/* ============================ EVENTS & BOOT ============================ */
function grabInputs(){
  const n = document.getElementById("f-name");
  if (n){ C.name = n.value.slice(0, 16); saveLS("coc:name", C.name); }
  const c = document.getElementById("f-code");
  if (c){ C.codeInput = c.value.toUpperCase().replace(/[^A-Z]/g, "").slice(0, 4); }
}

document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-a]");
  if (!t) return;
  const a = t.getAttribute("data-a");
  const v = t.getAttribute("data-v");
  grabInputs();

  if (a === "home"){ C.mode = "home"; C.err = ""; render(); }
  else if (a === "toHost"){ C.mode = "hostSetup"; C.err = ""; render(); }
  else if (a === "toJoin"){ C.mode = "join"; C.err = ""; render(); }
  else if (a === "emoji"){ C.emoji = v; saveLS("coc:emoji", C.emoji); render(); restoreFocusFix(); }
  else if (a === "target"){ C.target = parseInt(v, 10); render(); restoreFocusFix(); }
  else if (a === "pick2"){ C.allowPick2 = v === "1"; render(); restoreFocusFix(); }
  else if (a === "createRoom"){
    if (!C.name.trim()){ C.err = "Pick a name first!"; render(); return; }
    C.err = ""; startHost(null);
  }
  else if (a === "resumeHost"){
    const bk = loadLS("coc:host");
    const sess = loadLS("coc:session");
    if (bk && bk.S){ C.name = (sess && sess.name) || C.name; C.emoji = (sess && sess.emoji) || C.emoji; startHost(bk); }
    else { C.err = "Couldn't find that game to resume."; render(); }
  }
  else if (a === "joinRoom"){
    if (C.codeInput.length < 4){ C.err = "Type the 4-letter room code."; render(); return; }
    if (!C.name.trim()){ C.err = "Pick a name first!"; render(); return; }
    C.err = ""; C.mode = "room"; C.pub = null;
    startJoin(C.codeInput);
  }
  else if (a === "resumeGuest"){
    const sess = loadLS("coc:session");
    if (sess && sess.code){ C.name = sess.name || C.name; C.emoji = sess.emoji || C.emoji; C.mode = "room"; C.pub = null; C.err=""; startJoin(sess.code); }
  }
  else if (a === "startGame"){ if (C.isHost) startGame(); }
  else if (a === "selCard"){
    const i = parseInt(v, 10);
    const need = (C.pub && C.pub.black && C.pub.black.pick) || 1;
    const at = C.sel.indexOf(i);
    if (at >= 0) C.sel.splice(at, 1);
    else { if (C.sel.length >= need) C.sel.shift(); C.sel.push(i); }
    render();
  }
  else if (a === "submitCards"){
    const need = (C.pub && C.pub.black && C.pub.black.pick) || 1;
    if (C.sel.length !== need) return;
    const cards = C.sel.map(i => C.pub.hand[i]);
    C.sel = [];
    if (C.isHost) onSubmit(MYPID, S.round, cards);
    else if (joinConn && joinConn.open) joinConn.send({ t: "submit", pid: MYPID, round: C.pub.round, cards: cards });
  }
  else if (a === "pickCard"){
    if (C.picked) return;
    C.picked = true;
    const sid = parseInt(v, 10);
    if (C.isHost) onPick(MYPID, S.round, sid);
    else if (joinConn && joinConn.open) joinConn.send({ t: "czarPick", pid: MYPID, round: C.pub.round, sid: sid });
  }
  else if (a === "nextRound"){ if (C.isHost) nextRound(); }
  else if (a === "skipRound"){ if (C.isHost) skipRound(); }
  else if (a === "endGame"){ if (C.isHost && confirm("End the game for everyone?")) endGameNow(); }
  else if (a === "playAgain"){ if (C.isHost) playAgain(); }
  else if (a === "leave"){
    if (C.isHost && S && S.phase !== "over" && S.players.length > 1){
      if (!confirm("You're the host — leaving ends the game for everyone. Leave?")) return;
    }
    leaveGame();
  }
});

/* keep typed values on re-render */
document.addEventListener("input", (e) => {
  if (e.target && (e.target.id === "f-name" || e.target.id === "f-code")) grabInputs();
});
function restoreFocusFix(){ /* re-render loses focus; acceptable on tap-driven screens */ }

window.addEventListener("beforeunload", () => {
  if (!C.isHost && joinConn && joinConn.open){ try { joinConn.send({ t: "leave", pid: MYPID }); } catch(e){} }
});

/* boot: ?code=ABCD prefills join */
(function boot(){
  const m = location.search.match(/[?&]code=([A-Za-z]{4})/);
  if (m){ C.codeInput = m[1].toUpperCase(); C.mode = "join"; }
  render();
})();
</script>
